name: Angular CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Tests
      # We pass --browsers=ChromeHeadless to override the 'Chrome' default in karma.conf.js
      run: npm run test:run -- --browsers=ChromeHeadless

    - name: Build Project (Production)
      run: npm run build:prod

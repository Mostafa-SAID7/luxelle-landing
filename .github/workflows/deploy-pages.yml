name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular Project
        # The base-href flag must match the repository name (e.g. /luxelle-landing-page/) for GitHub pages
        # If your repo name is difference, you'll need to change base-href parameter.
        run: npm run build:prod -- --base-href /luxelle-landing-page/

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          # the output path depends on Angular configuration. From angular.json, the outputPath is dist/luxelle-landing-page
          path: ./dist/luxelle-landing-page

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

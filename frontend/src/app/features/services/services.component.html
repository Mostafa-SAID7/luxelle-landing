<section id="services" class="section-padding relative overflow-hidden">
  <div class="absolute inset-0 bg-luxelle-card/30 -z-10"></div>
  <div class="orb orb-rose absolute w-96 h-96 top-0 right-0 opacity-20 -z-10"></div>

  <div class="section-container">

    <!-- Header -->
    <div class="section-header" appScrollReveal>
      <span class="section-eyebrow">What We Offer</span>
      <h2 class="mb-4">Our <span class="text-gradient">Services</span></h2>
      <div class="accent-divider"></div>
      <p class="text-luxelle-tertiary mt-5 max-w-lg mx-auto text-base leading-relaxed">
        Discover our comprehensive range of luxury beauty and wellness treatments, crafted for every need.
      </p>
    </div>

    <!-- Grid -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
      <div
        *ngFor="let service of services; let i = index"
        appScrollReveal [animationType]="'fadeInUp'"
        class="group luxelle-card cursor-pointer flex flex-col"
        [style.animation-delay]="(i * 80) + 'ms'"
      >
        <!-- Icon -->
        <div class="icon-box mb-5 group-hover:scale-110 transition-transform duration-300">
          <ng-container [ngSwitch]="service.icon">
            <lucide-icon name="sparkles" *ngSwitchCase="'sparkles'" class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="scissors" *ngSwitchCase="'scissors'" class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="palette"  *ngSwitchCase="'palette'"  class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="droplet"  *ngSwitchCase="'droplet'"  class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="eye"      *ngSwitchCase="'eye'"      class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="hand"     *ngSwitchCase="'hand'"     class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="heart"    *ngSwitchCase="'heart'"    class="w-5 h-5 text-rose-gold"></lucide-icon>
            <lucide-icon name="star"     *ngSwitchDefault           class="w-5 h-5 text-rose-gold"></lucide-icon>
          </ng-container>
        </div>

        <!-- Name -->
        <h3 class="text-base font-semibold text-luxelle mb-2 leading-snug">{{ service.name }}</h3>

        <!-- Description -->
        <p class="text-luxelle-tertiary text-sm leading-relaxed flex-1">
          {{ service.description }}
        </p>

        <!-- Price / Duration row -->
        <div class="mt-5 pt-4 border-t border-luxelle-subtle flex items-center justify-between">
          <div>
            <p class="text-[11px] text-luxelle-tertiary uppercase tracking-wider mb-0.5">From</p>
            <p class="text-lg font-bold text-rose-gold leading-none">${{ service.price }}</p>
          </div>
          <div class="text-right">
            <p class="text-[11px] text-luxelle-tertiary uppercase tracking-wider mb-0.5">Duration</p>
            <p class="text-lg font-bold text-warm-gold leading-none">
              {{ service.duration }}<span class="text-xs font-medium">m</span>
            </p>
          </div>
        </div>

        <!-- Add to Cart CTA -->
        <button
          (click)="addToCart(service)"
          class="mt-4 flex items-center justify-center gap-1.5 w-full py-2.5 rounded-xl text-xs font-semibold border transition-all duration-300"
          [ngClass]="isAdded(service.id)
            ? 'border-green-500/40 text-green-400 bg-green-500/10'
            : 'border-rose-gold/30 text-rose-gold hover:bg-rose-gold/10'"
        >
          <ng-container *ngIf="!isAdded(service.id)">
            <lucide-icon name="shopping-bag" class="w-3.5 h-3.5"></lucide-icon>
            Add to Cart
          </ng-container>
          <ng-container *ngIf="isAdded(service.id)">
            <lucide-icon name="check" class="w-3.5 h-3.5"></lucide-icon>
            Added to Cart!
          </ng-container>
        </button>

      </div>
    </div>
  </div>
</section>
